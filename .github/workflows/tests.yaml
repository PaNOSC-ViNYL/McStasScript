name: McStasScript tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  unit_tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: mcstasscript

      - name: Checkout libpyvinyl
        uses: actions/checkout@v4
        with:
          repository: PaNOSC-ViNYL/libpyvinyl
          ref: remove_pint_pin
          path: libpyvinyl

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (libpyvinyl)
        run: |
          cd libpyvinyl
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Install dependencies (mcstasscript)
        run: |
          cd mcstasscript
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: python -m pytest mcstasscript/mcstasscript/tests/

  integration_tests:
    needs: unit_tests
    if: always() && needs.unit_tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict
          activate-base: true

      - name: Install McStas
        shell: bash -l {0}
        run: |
          conda install -y mcstas

      - name: Install McStasScript from PR branch
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps

      - name: Run integration tests
        shell: bash -l {0}
        run: |
          python -m unittest discover -s mcstasscript/integration_tests -v
